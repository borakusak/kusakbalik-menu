<!DOCTYPE html>
<html lang="tr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuşak Balık Menü</title>

<style>

body{
margin:0;
font-family:Arial;
background:#3b0f19;
color:#f5d7a1;
text-align:center;
}

header{
padding:30px;
font-size:34px;
font-weight:bold;
border-bottom:2px solid #c9a227;
}

button{
background:#c9a227;
border:none;
padding:15px 30px;
margin:15px;
font-size:18px;
border-radius:10px;
cursor:pointer;
}

.menu{
display:none;
padding:20px;
}

iframe{
width:95%;
height:800px;
border:none;
margin-top:20px;
}

footer{
margin-top:40px;
padding:20px;
border-top:2px solid #c9a227;
}

</style>

<script>

function showMenu(id){

document.getElementById("yemek").style.display="none";
document.getElementById("icecek").style.display="none";
document.getElementById("tatli").style.display="none";

document.getElementById(id).style.display="block";

}

</script>

</head>

<body>

<header>KUŞAK BALIK</header>

<div>

<button onclick="showMenu('yemek')">🍽 Yemek Menüsü</button>

<button onclick="showMenu('icecek')">🍹 İçecek Menüsü</button>

<button onclick="showMenu('tatli')">🍰 Tatlı Menüsü</button>

</div>

<div id="yemek" class="menu">
<h2>Yemek Menüsü</h2>
<iframe src="yemekler-menu.pdf"></iframe>
</div>

<div id="icecek" class="menu">
<h2>İçecek Menüsü</h2>
<iframe src="icecek-menu.pdf"></iframe>
</div>

<div id="tatli" class="menu">
<h2>Tatlı Menüsü</h2>
<iframe src="tatli-menu.pdf"></iframe>
</div>

<footer>
Afiyet Olsun
</footer>

</body>

</html>
