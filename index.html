<!DOCTYPE html>
<html lang="tr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuşak Balık Menü</title>

<style>

body{
margin:0;
font-family:Arial;
background:#3b0f19;
color:#f5d7a1;
text-align:center;
display:flex;
flex-direction:column;
align-items:center;
}

header{
padding:30px;
font-size:34px;
font-weight:bold;
border-bottom:2px solid #c9a227;
}
.logo{
width:240px;
height:auto;
display:block;
margin:40px auto 20px auto;
}

.logo-area{
margin-top:10px;
padding-bottom:25px;
border-bottom:2px solid #c9a227;
width:65%;
margin-left:auto;
margin-right:auto;
}

.slogan{
font-size:18px;
margin-bottom:25px;
}
button{
background:#c9a227;
border:none;
padding:15px 30px;
margin:15px;
font-size:18px;
border-radius:10px;
cursor:pointer;
}

.menu{
display:none;
padding:20px;
}

iframe{
width:95%;
height:800px;
border:none;
margin-top:20px;
}

footer{
margin-top:40px;
padding:20px;
border-top:2px solid #c9a227;
width:65%;
margin-left:auto;
margin-right:auto;
}

</style>

<script>

function showMenu(id){

document.getElementById("yemek").style.display="none";
document.getElementById("icecek").style.display="none";
document.getElementById("tatli").style.display="none";

document.getElementById(id).style.display="block";

}

</script>

</head>

<body>

<div class="logo-area">

<img src="./logo.png" class="logo" alt="Kuşak Balık Logo">



<p class="slogan">Denizden Sofranıza</p>

</div>

<div>


</div>

<a href="yemek.png" target="_blank">
<button>🍽 Yemek Menüsü</button>
</a>

<a href="icecek.png" target="_blank">
<button>🍹 İçecek Menüsü</button>
</a>

<a href="tatli.png" target="_blank">
<button>🍰 Tatlı Menüsü</button>
</a>

<footer>
Afiyet Olsun
</footer>

</body>

</html>
