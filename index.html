<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuşak Balık Menü</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#4b0f19,#2a0710);
color:#f5d7a1;
text-align:center;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
min-height:100vh;
}

/* LOGO */
.logo{
width:50%;
max-width:250px;
margin-top:20px;
}

/* SLOGAN */
.slogan{
font-size:20px;
margin:15px 0;
}

/* ÇİZGİ */
.line{
height:2px;
width:60%;
background:#c9a227;
margin:15px auto;
}

/* BUTON */
button{
background:linear-gradient(145deg,#c9a227,#a87f1d);
border:none;
padding:15px 25px;
margin:10px;
border-radius:20px;
font-size:18px;
width:250px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 5px 20px rgba(0,0,0,0.4);
}

/* DİL SEÇİMİ */
.language{
position:fixed;
top:20px;
right:20px;
background:rgba(0,0,0,0.3);
padding:6px 10px;
border-radius:8px;
z-index:9999;
}

.language a{
color:#c9a227;
text-decoration:none;
font-weight:bold;
margin:0 5px;
}

.language a.active{
color:white;
}

/* FOOTER */
footer{
margin-top:20px;
}

</style>
</head>

<body>

<!-- DİL -->
<div class="language">
<a href="index.html" class="active">TR</a> |
<a href="en.html">EN</a>
</div>

<!-- LOGO -->
<img src="./logo.png" class="logo">

<p class="slogan">Denizden Sofranıza</p>
<div class="line"></div>

<!-- MENÜLER -->
<a href="yemek.png" target="_blank">
<button>🍽️ Yemek Menüsü</button>
</a>

<a href="icecek.png" target="_blank">
<button>🍹 İçecek Menüsü</button>
</a>

<a href="tatli.png" target="_blank">
<button>🍰 Tatlı Menüsü</button>
</a>

<div class="line"></div>

<footer>Afiyet Olsun</footer>

</body>
</html>
